spring.application.name=Springboot-API-REST

# Puerto del servidor para el contenedor (mapeado desde el host)
server.port=8080

# CORS habilitado a nivel global
spring.web.allow-cors=true

# Base de datos en la EC2 de MySQL
spring.datasource.url=jdbc:mysql://10.0.155.28:3306/despacho_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=appuser
spring.datasource.password=appuser
spring.datasource.platform=mysql

spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger / OpenAPI
# Configuración para acceder a Swagger UI en /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
