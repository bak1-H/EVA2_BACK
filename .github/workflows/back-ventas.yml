name: Deploy Ventas Backend

on:
  push:
    branches:
      - main
    paths:
      - 'back-Ventas_SpringBoot/**' # Solo se activa si hay cambios en esta carpeta
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      # PASO CRUCIAL: Construir desde la subcarpeta
      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: back-ventas # Nombre del repo en tu ECR
          IMAGE_TAG: latest
        run: |
          # Entramos a la carpeta del proyecto antes de buildear
          cd back-Ventas_SpringBoot
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACK_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
              "docker pull ${{ steps.login-ecr.outputs.registry }}/back-ventas:latest",
              "docker stop back-ventas-container || true",
              "docker rm back-ventas-container || true",
              "docker run -d --name back-ventas-container -p 8080:8080 ${{ steps.login-ecr.outputs.registry }}/back-ventas:latest"
            ]'
